<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads - Bridge 2 Bitcoin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --orange: #f7931a;
            --dark: #1a1a1a;
            --light: #ffffff;
            --gray: #666666;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: var(--dark);
            background: var(--light);
        }
        
        header {
            background: var(--dark);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        nav a {
            color: var(--light);
            text-decoration: none;
            margin-left: 1.5rem;
            transition: color 0.3s;
        }
        
        nav a:hover {
            color: var(--orange);
        }
        
        .section {
            padding: 4rem 2rem;
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: var(--gray);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        
        .download-card {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 2rem;
        }
        
        .download-card object,
        .download-card iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 4px;
            background: #fff;
        }
        
        .download-actions {
            margin-top: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .download-actions a {
            display: inline-block;
            background: var(--orange);
            color: var(--light);
            padding: 0.8rem 1.5rem;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: transform 0.3s, opacity 0.3s;
        }
        
        .download-actions a:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        
        footer {
            background: var(--dark);
            color: var(--gray);
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
        }
        
        footer a {
            color: var(--orange);
            text-decoration: none;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        @media (max-width: 600px) {
            .download-card object,
            .download-card iframe {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><img src="logo.png" alt="Bridge 2 Bitcoin" style="height:50px; background:transparent;"></a>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="downloads.html">Downloads</a>
        </nav>
    </header>
    
    <section class="section">
        <h1>Downloads</h1>
        <p class="subtitle">Instructions: Print double-sided, flipping on the short side, then fold to form a trifold leaflet.</p>
        <div class="download-card">
            <object data="Merchant-Flyer-Swiss_WoS-v7.0.pdf" type="application/pdf" aria-label="Bridge 2 Bitcoin leaflet preview">
                <iframe src="Merchant-Flyer-Swiss_WoS-v7.0.pdf" title="Bridge 2 Bitcoin leaflet"></iframe>
            </object>
            <div class="download-actions">
                <a href="Merchant-Flyer-Swiss_WoS-v7.0.pdf" download>Download leaflet (PDF)</a>
            </div>
        </div>
    </section>
    
    <footer>
        <p>Bridge 2 Bitcoin — Growing the UK Bitcoin Economy</p>
        <div class="social-links">
            <a href="https://twitter.com/bridge2bitcoin" target="_blank">Twitter</a>
            <a href="https://instagram.com/bridge2bitcoin" target="_blank">Instagram</a>
            <a href="https://geyser.fund/project/bridge2bitcoin" target="_blank">Geyser</a>
            <a href="https://njump.me/npub1nqt6hg6k78la4uj0c0yc44s28t8nkgaaee7rdnrr0vszlul4wwdszsfpug" target="_blank">Nostr</a>
        </div>
    </footer>
</body>
</html>
